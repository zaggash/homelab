services:
  matrix:
    container_name: matrix
    image: ghcr.io/element-hq/synapse:v1.157.1@sha256:d1fce43d7501428c461f2758dc10342555b946dc9f1d03c1b1b8aec1a4e8d130
    labels:
      folder.view3: Tools
      net.unraid.docker.icon: ${SECRET_APPDATA}/icons/matrix.png
      traefik.enable: true
      traefik.http.routers.matrix.rule: Host(`matrix.${SECRET_DOMAIN}`)
      traefik.http.routers.matrix.entryPoints: websecure
      traefik.http.services.matrix.loadbalancer.server.port: 8008
    volumes:
      - "${SECRET_APPDATA}/matrix:/data"
    environment:
      TZ: ${TZ}
      UID: ${UID}
      GID: ${GID}
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
    networks:
      - tools
    restart: always

  matrix-web:
    container_name: matrix-web
    image: ghcr.io/element-hq/element-web:v1.12.24@sha256:9f9b546280e67e492d56f6e775c449e74356bffb98daaf211abc755276713fad
    labels:
      folder.view3: Tools
      net.unraid.docker.icon: ${SECRET_APPDATA}/icons/matrix-web.png
      traefik.enable: true
      traefik.http.routers.matrix-web.rule: Host(`matrix-web.${SECRET_DOMAIN}`)
      traefik.http.routers.matrix-web.entryPoints: websecure
      traefik.http.services.matrix-web.loadbalancer.server.port: 80
    environment:
      TZ: ${TZ}
    networks:
      - tools
    restart: always
