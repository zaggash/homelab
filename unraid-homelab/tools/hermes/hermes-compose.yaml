services:
  hermes-w: &hermes_service
    container_name: hermes-w
    image: ghcr.io/zaggash/hermes-agent:v2026.6.5@sha256:fee321284b35d11f85fd504f39de09f77eee7908193a689513db31951036ef65
    command: gateway run
    labels:
      folder.view3: Tools
      net.unraid.docker.icon: ${SECRET_APPDATA}/icons/hermes.png
    volumes:
      - "${SECRET_APPDATA}/hermes/w-agent:/opt/data/"
    environment:
      TZ: ${TZ}
    networks:
      - gluetun
    restart: always

  hermes-p:
    <<: *hermes_service
    container_name: hermes-p
    volumes:
      - "${SECRET_APPDATA}/hermes/p-agent:/opt/data/"
