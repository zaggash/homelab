services:
  hermes-w: &hermes_service
    container_name: hermes-w
    image: ghcr.io/zaggash/hermes-agent:v2026.6.5@sha256:a12c3a777466e42924ba9219d05df1bbc37a996016c29c854bae1099825403c9
    command: gateway run
    labels:
      folder.view3: Tools
      net.unraid.docker.icon: ${SECRET_APPDATA}/icons/hermes.png
    volumes:
      - "${SECRET_APPDATA}/hermes/w-agent:/opt/data/"
    environment:
      TZ: ${TZ}
    networks:
      - gluetun
    restart: always

  hermes-p:
    <<: *hermes_service
    container_name: hermes-p
    volumes:
      - "${SECRET_APPDATA}/hermes/p-agent:/opt/data/"
