services:
  immich-redis:
    container_name: immich_redis
    image: ghcr.io/valkey-io/valkey:9@sha256:3acc0687f2a2e1091fae6450d7842dd658c941338cf0a873ddd9e14b9e4ea4dd
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - NET_RAW
    labels:
      folder.view3: Immich
      net.unraid.docker.icon: ${SECRET_APPDATA}/icons/redis.png
    networks:
      - immich-db
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${SECRET_APPDATA}/immich/redis:/data
    environment:
      TZ: ${TZ}
    restart: always
    healthcheck:
      test: redis-cli ping || exit 1
