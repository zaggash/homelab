services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:v3.0.1@sha256:46dedfc5848f7313bd6b584ea9f2648057430307aad6de56de968f6710a72cae
    user: '1000:1000'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - NET_RAW
    labels:
      folder.view3: Immich
      net.unraid.docker.icon: ${SECRET_APPDATA}/icons/immich.png
      traefik.enable: true
      traefik.docker.network: homelab_immich-front
      traefik.http.routers.immich.rule: Host(`photos.${SECRET_DOMAIN}`)
      traefik.http.routers.immich.entryPoints: websecure
      traefik.http.services.immich.loadbalancer.server.port: 2283
    devices:
      - /dev/dri:/dev/dri
    networks:
      - immich-front
      - immich-ml
      - immich-db
    volumes:
      - ${SECRET_IMMICH_UPLOAD_LOCATION}:/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      TZ: ${TZ}
      LOG_LEVEL: log
      IMMICH_METRICS: false
      DB_HOSTNAME: immich_pg
      DB_DATABASE_NAME: ${SECRET_IMMICH_DB_DATABASE_NAME}
      DB_USERNAME: ${SECRET_IMMICH_DB_USERNAME}
      DB_PASSWORD: ${SECRET_IMMICH_DB_PASSWORD}
      REDIS_HOSTNAME: immich_redis
      #REDIS_PASSWORD: ${SECRET_IMMICH_REDIS_PASSWORD}
    restart: always
    healthcheck:
      disable: false
