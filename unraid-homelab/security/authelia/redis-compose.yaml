services:
  authelia-redis:
    container_name: authelia-redis
    image: docker.io/redis:8.8@sha256:4c7ecf5d14207f5baf8e140ab428a54ae5cf2a0411956f75deb0ef89d3cb4fda
    command: redis-server --requirepass "${SECRET_AUTHELIA_REDIS_PASSWORD}"
    labels:
      folder.view3: Security
      net.unraid.docker.icon: ${SECRET_APPDATA}/icons/redis.png
    volumes:
      - "${SECRET_APPDATA}/authelia/redis:/data"
    networks:
      - authelia-db
    environment:
      TZ: ${TZ}
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
