services:
  authelia-redis:
    container_name: authelia-redis
    image: docker.io/redis:8.8@sha256:2838d5524559494f6f1cd66e97e76b200d64a633a8614200620755ed395daf32
    command: redis-server --requirepass "${SECRET_AUTHELIA_REDIS_PASSWORD}"
    labels:
      folder.view3: Security
      net.unraid.docker.icon: ${SECRET_APPDATA}/icons/redis.png
    volumes:
      - "${SECRET_APPDATA}/authelia/redis:/data"
    networks:
      - authelia-db
    environment:
      TZ: ${TZ}
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
