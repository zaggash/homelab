services:
  grimmory:
    container_name: grimmory
    depends_on:
     books-db:
        condition: service_healthy
    image: ghcr.io/grimmory-tools/grimmory:v2.3.0@sha256:9014247f591074529894f81115ca40f899db697e89f72c2fe91ec530e3f19597
    labels:
      folder.view2: Media
      net.unraid.docker.icon: ${SECRET_APPDATA}/icons/grimmory.png
      traefik.enable: true
      traefik.docker.network: homelab_media
      traefik.http.middlewares.kobo-sync-headers.headers.customrequestheaders.X-Scheme: https
      traefik.http.routers.grimmory.rule: Host(`books.${SECRET_DOMAIN}`)
      traefik.http.routers.grimmory.entryPoints: websecure
      traefik.http.routers.grimmory.middlewares: kobo-sync-headers
      traefik.http.services.grimmory.loadbalancer.server.port: 6060
    volumes:
      - "${SECRET_APPDATA}/grimmory/data:/app/data"
      - "${SECRET_DATADIR}/downloads/complete/ebooks_import:/bookdrop"
      - "${SECRET_DATADIR}/media/ebooks:/books"
    environment:
      TZ: ${TZ}
      USER_ID: ${UID}
      GROUP_ID: ${GID}
      DATABASE_URL: jdbc:mariadb://books-db:3306/${GRIMMORY_DB}
      DATABASE_USERNAME: ${GRIMMORY_MARIADB_USERNAME}
      DATABASE_PASSWORD: ${GRIMMORY_MARIADB_PASSWORD}
    networks:
      - media
      - media-backend
    healthcheck:
      test: wget -q -O - http://localhost:6060/api/v1/healthcheck
      interval: 60s
      retries: 5
      start_period: 60s
      timeout: 10s
    restart: always
