services:
  books-db:
    container_name: books-db
    image: ghcr.io/linuxserver/mariadb:11.4.10@sha256:c45132cefda1fc6e2034539631fa769070f37d9f673100dba7c0f7077c2e8b8c
    labels:
      folder.view3: Media
      net.unraid.docker.icon: ${SECRET_APPDATA}/icons/mariadb.png
    volumes:
      - "${SECRET_APPDATA}/grimmory/db:/config"
    environment:
      TZ: ${TZ}
      PUID: ${UID}
      GUID: ${GID}
      MYSQL_ROOT_PASSWORD: ${GRIMMORY_MARIADB_ROOTPW}
      MYSQL_DATABASE: ${GRIMMORY_DB}
      MYSQL_USER: ${GRIMMORY_MARIADB_USERNAME}
      MYSQL_PASSWORD: ${GRIMMORY_MARIADB_PASSWORD}
    networks:
      - media-backend
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always
