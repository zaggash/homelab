services:
  books-db:
    container_name: books-db
    image: ghcr.io/linuxserver/mariadb:11.4.9@sha256:60b3fc40a8cc4fc0bb846956e9f7f1d69ac0f9fc3b9d21a3ee14faa75515fbc2
    labels:
      folder.view2: Media
      net.unraid.docker.icon: ${SECRET_APPDATA}/icons/mariadb.png
    volumes:
      - "${SECRET_APPDATA}/booklore/db:/config"
    environment:
      TZ: ${TZ}
      PUID: ${UID}
      GUID: ${GID}
      MYSQL_ROOT_PASSWORD: ${BOOKLORE_MARIADB_ROOTPW}
      MYSQL_DATABASE: booklore
      MYSQL_USER: ${BOOKLORE_MARIADB_USERNAME}
      MYSQL_PASSWORD: ${BOOKLORE_MARIADB_PASSWORD}
    networks:
      - media-backend
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always
