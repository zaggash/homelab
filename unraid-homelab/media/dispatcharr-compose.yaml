services:
  dispatcharr:
    container_name: dispatcharr
    image: ghcr.io/dispatcharr/dispatcharr:0.28.1@sha256:38ec7bdd8d4f784b442dd88a2a21165fddb60567b3dfca062adec82c0428432e
    labels:
      folder.view3: Media
      net.unraid.docker.icon: ${SECRET_APPDATA}/icons/dispatcharr.png
      traefik.enable: true
      traefik.docker.network: homelab_media
      traefik.http.routers.dispatcharr.rule: Host(`iptv.${SECRET_DOMAIN}`)
      traefik.http.routers.dispatcharr.entryPoints: websecure
      traefik.http.routers.dispatcharr.service: dispatcharr
      traefik.http.services.dispatcharr.loadbalancer.server.port: 9191
    volumes:
      - "${SECRET_APPDATA}/dispatcharr:/data"
    environment:
      TZ: ${TZ}
      DISPATCHARR_ENV: aio
      REDIS_HOST: localhost
      CELERY_BROKER_URL: redis://localhost:6379/0
      DISPATCHARR_LOG_LEVEL: info
    devices:
      - /dev/dri:/dev/dri
    networks:
      media:
    restart: unless-stopped
