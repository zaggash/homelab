services:
  clonarr:
    container_name: clonarr
    image: ghcr.io/prophetse7en/clonarr:v2.3.0@sha256:59c03f41abec1f4095e4ddc406190cfa9f61496a9fbb767b03315020583b2649
    labels:
      folder.view3: Media
      net.unraid.docker.icon: ${SECRET_APPDATA}/icons/clonarr.png
      traefik.enable: true
      traefik.docker.network: homelab_media
      traefik.http.routers.clonarr.rule: Host(`clonarr.${SECRET_DOMAIN}`)
      traefik.http.routers.clonarr.entryPoints: websecure
      traefik.http.services.clonarr.loadbalancer.server.port: 6060
    environment:
      TZ: ${TZ}
      PUID: ${UID}
      PGID: ${GID}
    volumes:
      - "${SECRET_APPDATA}/clonarr:/config"
    restart: unless-stopped
    networks:
      - media
