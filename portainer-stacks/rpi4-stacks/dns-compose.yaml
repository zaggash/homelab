version: "3"
services:
  dns:
    hostname: dns
    domainname: home.lan
    image: docker.io/technitium/dns-server:15.2.0@sha256:23d3b63d959e997800b095fe93009b3fae271b5258234ff2ade8535cb33682c8
    network_mode: "host"
    environment:
      TZ: 'Europe/Paris'
      DNS_SERVER_DOMAIN: "home.lan"
    volumes:
      - 'config:/etc/dns'
      - 'log:/var/log/technitium/dns'
    restart: unless-stopped

volumes:
  config:
  log:
