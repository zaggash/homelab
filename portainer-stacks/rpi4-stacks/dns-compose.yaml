version: "3"
services:
  dns:
    hostname: dns
    domainname: home.lan
    image: docker.io/technitium/dns-server:15.4.0@sha256:df7d90ef0f7b6fff6916d291a7022cd902290cc31c3141d4158b6c375a641b41
    network_mode: "host"
    environment:
      TZ: 'Europe/Paris'
      DNS_SERVER_DOMAIN: "home.lan"
    volumes:
      - 'config:/etc/dns'
      - 'log:/var/log/technitium/dns'
    restart: unless-stopped

volumes:
  config:
  log:
