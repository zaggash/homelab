version: "3"
services:
  os-server:
    image: ghcr.io/lemker/unifi-os-server:v1.2.0@sha256:9e42627dbcc0a9243a855bd256633537193d6ce0ed6698d82c14d9580a66c5e9
    hostname: unifi
    domainname: home.lan
    dns:
      - 192.168.1.10
      - 1.1.1.1
    cgroup: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    extra_hosts:
      host.docker.internal: host-gateway
    tmpfs:
      - /run:exec
      - /run/lock
      - /tmp:exec
      - /var/lib/journal
      - /var/opt/unifi/tmp:size=64m
    environment:
      - UOS_SYSTEM_IP=unifi.home.lan
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - data/persistent:/persistent
      - data/var-log:/var/log
      - data/data:/data
      - data/srv:/srv
      - data/var-lib-unifi:/var/lib/unifi
      - data/var-lib-mongodb:/var/lib/mongodb
      - data/etc-rabbitmq-ssl:/etc/rabbitmq/ssl
    ports:
      - 11443:11443
      - 5005:5005 # Optional
      - 9543:9543 # Optional
      - 6789:6789 # Optional
      - 8080:8080
      - 8443:8443 # Optional
      - 3478:3478/udp
      - 10003:10003/udp
    restart: unless-stopped

volumes:
  data:
